name: Data Source Health Check

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip README commit)"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pystac-client planetary-computer \
            xarray zarr gcsfs fsspec earthaccess \
            earthengine-api google-auth

      - name: Run health checks
        env:
          EARTHENGINE_TOKEN: ${{ secrets.EARTHENGINE_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: python scripts/check_data_sources.py --output data_status/history.json

      - name: Update README status table
        run: python scripts/update_readme_status.py

      - name: Commit and push if changed
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_status/history.json README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly data source health check [skip ci]"
            git push origin HEAD
          fi

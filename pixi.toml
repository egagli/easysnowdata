[workspace]
name = "easysnowdata"
version = "0.0.22"
description = "A Python package to easily retrieve data relevant to snow science"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.14"
numpy = "*"
matplotlib = "*"
pandas = "*"
geopandas = "*"
rasterio = "*"
xarray = "*"
rioxarray = "*"
shapely = "*"
pystac-client = "*"
planetary-computer = "*"
odc-stac = "*"
earthengine-api = "*"
xee = "*"
beautifulsoup4 = "*"
py3dep = "*"
earthaccess = "*"
contextily = "*"
folium = "*"
mapclassify = "*"
lxml = "*"
scikit-image = "*"
tqdm = "*"
dask = "*"
zarr = "*"
gcsfs = "*"
fsspec = "*"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"
pre-commit = "*"
ipykernel = "*"
nbconvert = "*"
nbformat = "*"
mkdocs = "*"
mkdocs-material = ">=9.1.3"
mkdocstrings = "*"
mkdocstrings-python = "*"
pygments = "*"
pymdown-extensions = "*"
python-build = "*"
bump-my-version = "*"
twine = "*"
codespell = "*"

[feature.dev.pypi-dependencies]
mkdocs-jupyter = ">=0.24.0"
mkdocs-git-revision-date-localized-plugin = "*"
git-changelog = "*"

[feature.dev.tasks]
test = "pytest tests/"
test-fast = "pytest tests/ -m 'not requires_earthengine and not requires_earthaccess'"
lint = "ruff check easysnowdata/ tests/ scripts/"
format = "ruff format easysnowdata/ tests/ scripts/"
docs-serve = "mkdocs serve"
docs-build = "mkdocs build"
changelog = "git-changelog --output CHANGELOG.md"
check-sources = "python scripts/check_data_sources.py"
update-status = "python scripts/update_readme_status.py"

[environments]
default = { features = [], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
